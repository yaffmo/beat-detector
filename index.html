<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>節拍偵測器</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222d;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --glow: rgba(108,99,255,0.55);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.25rem 4rem;
      gap: 1.5rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: .04em;
    }

    /* ── BPM ring ── */
    .bpm-ring {
      position: relative;
      width: 230px; height: 230px;
      border-radius: 50%;
      background: var(--surface);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: box-shadow .08s ease;
    }
    .bpm-ring.pulse {
      box-shadow: 0 0 0 16px var(--glow), 0 0 50px var(--glow);
    }
    .bpm-ring canvas {
      position: absolute; top: 0; left: 0;
      border-radius: 50%; pointer-events: none;
    }
    .bpm-number {
      font-size: 5rem; font-weight: 800;
      line-height: 1; letter-spacing: -.03em;
      font-variant-numeric: tabular-nums;
    }
    .bpm-label { color: var(--muted); font-size: .8rem; letter-spacing: .2em; margin-top: .3rem; }
    .bpm-status { position: absolute; bottom: 28px; font-size: .72rem; color: var(--muted); }

    /* ── Waveform ── */
    #waveCanvas {
      width: 100%; max-width: 520px; height: 72px;
      background: var(--surface); border-radius: 14px; display: block;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border-radius: 18px;
      padding: 1.25rem 1.5rem;
      width: 100%; max-width: 520px;
    }
    .card-title {
      font-size: .78rem; letter-spacing: .18em;
      color: var(--muted); text-transform: uppercase;
      margin-bottom: 1.1rem;
    }

    /* ── Sliders ── */
    .row {
      display: flex; align-items: center; gap: .75rem;
      margin-bottom: .85rem;
    }
    .row:last-child { margin-bottom: 0; }
    .row label { font-size: .85rem; color: var(--muted); min-width: 44px; }
    .row input[type=range] { flex: 1; accent-color: var(--accent); cursor: pointer; height: 4px; }
    .row .val { font-size: .88rem; font-weight: 600; min-width: 42px; text-align: right; }

    .row .fine { display: flex; gap: .4rem; }
    .fine button {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--surface2); color: var(--text);
      border: 1px solid #333; font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .fine button:hover { background: #2c2c3a; }
    .fine button:active { transform: scale(.93); }

    /* ── Beat dots ── */
    .beat-dots {
      display: flex; gap: .55rem; justify-content: center; margin-top: .9rem;
    }
    .dot {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--surface2);
      transition: background .06s, box-shadow .06s;
    }
    .dot.on { background: var(--accent); box-shadow: 0 0 12px var(--glow); }
    .dot.on-accent { background: var(--accent2); box-shadow: 0 0 12px rgba(255,101,132,.6); }

    /* ── Auto-sync toggle ── */
    .sync-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem;
    }
    .sync-row span { font-size: .85rem; color: var(--muted); }
    .toggle {
      width: 46px; height: 26px; border-radius: 13px;
      background: var(--surface2); border: 1px solid #444;
      cursor: pointer; transition: background .2s; position: relative;
    }
    .toggle.on { background: var(--accent); }
    .toggle::after {
      content: ''; position: absolute;
      width: 20px; height: 20px; border-radius: 50%;
      background: #fff; top: 2px; left: 2px; transition: transform .2s;
    }
    .toggle.on::after { transform: translateX(20px); }

    /* ── Buttons ── */
    .btn-row {
      display: flex; gap: .75rem; width: 100%; max-width: 520px;
    }
    button.main {
      flex: 1; padding: .9rem;
      border-radius: 14px; border: none; cursor: pointer;
      font-size: .95rem; font-weight: 700;
      transition: opacity .15s, transform .1s, box-shadow .2s;
    }
    button.main:active { transform: scale(.96); }
    button.main:disabled { opacity: .3; cursor: default; }

    .btn-mic {
      background: linear-gradient(135deg, var(--accent), #9b8cff);
      color: #fff;
      box-shadow: 0 4px 18px rgba(108,99,255,.35);
    }
    .btn-mic:hover:not(:disabled) { box-shadow: 0 6px 24px rgba(108,99,255,.55); }
    .btn-mic.active { background: linear-gradient(135deg, #e84545, var(--accent2)); box-shadow: 0 4px 18px rgba(232,69,69,.35); }

    .btn-metro {
      background: linear-gradient(135deg, #2a9d8f, #57cc99);
      color: #fff;
      box-shadow: 0 4px 18px rgba(42,157,143,.3);
    }
    .btn-metro:hover:not(:disabled) { box-shadow: 0 6px 24px rgba(42,157,143,.5); }

    /* ── Status ── */
    #status {
      font-size: .82rem; color: var(--muted);
      text-align: center; min-height: 1.1em;
    }
  </style>
</head>
<body>

  <h1>節拍偵測器</h1>

  <!-- BPM ring -->
  <div class="bpm-ring" id="bpmRing">
    <canvas id="ringCanvas" width="230" height="230"></canvas>
    <div class="bpm-number" id="bpmNum">--</div>
    <div class="bpm-label">BPM</div>
    <div class="bpm-status" id="bpmStatus"></div>
  </div>

  <!-- Waveform -->
  <canvas id="waveCanvas"></canvas>

  <!-- Metronome card -->
  <div class="card">
    <div class="card-title">節拍器</div>

    <div class="sync-row">
      <span>自動同步偵測 BPM</span>
      <div class="toggle on" id="syncToggle"></div>
    </div>

    <div class="row">
      <label>BPM</label>
      <div class="fine"><button id="bpmMinus">−</button></div>
      <input type="range" id="bpmSlider" min="40" max="240" value="120" step="1" />
      <div class="fine"><button id="bpmPlus">+</button></div>
      <span class="val" id="bpmVal">120</span>
    </div>

    <div class="row">
      <label>拍號</label>
      <input type="range" id="beatsSlider" min="2" max="8" value="4" step="1" />
      <span class="val" id="beatsVal">4/4</span>
    </div>

    <div class="row">
      <label>音量</label>
      <input type="range" id="volSlider" min="0" max="100" value="70" step="1" />
      <span class="val" id="volVal">70%</span>
    </div>

    <div class="beat-dots" id="beatDots"></div>
  </div>

  <!-- Action buttons -->
  <div class="btn-row">
    <button class="main btn-mic" id="micBtn">🎙 開始偵測</button>
    <button class="main btn-metro" id="metroBtn">▶ 節拍器</button>
  </div>

  <div id="status">點擊「開始偵測」，對著麥克風播放音樂</div>

  <script>
  // ── State ──
  const S = {
    ctx: null, analyser: null, micStream: null, sourceNode: null,
    listening: false, metroOn: false, autoSync: true,
    bpm: 120, beats: 4, vol: 0.7,
    metroTimer: null, nextBeat: 0, beatCount: 0,
    energyHist: [], beatIntervals: [], smoothBpms: [],
    rafId: null, lastBeat: 0,
  };

  function audioCtx() {
    if (!S.ctx) S.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (S.ctx.state === 'suspended') S.ctx.resume();
    return S.ctx;
  }

  // ── Ring canvas ──
  const ring = document.getElementById('bpmRing');
  const rc = document.getElementById('ringCanvas').getContext('2d');

  function drawRing(progress) {
    const s = 230, cx = s / 2, cy = s / 2, r = cx - 7;
    rc.clearRect(0, 0, s, s);
    rc.beginPath(); rc.arc(cx, cy, r, 0, Math.PI * 2);
    rc.strokeStyle = '#22222d'; rc.lineWidth = 6; rc.stroke();
    if (progress > 0) {
      const g = rc.createLinearGradient(0, 0, s, s);
      g.addColorStop(0, '#6c63ff'); g.addColorStop(1, '#ff6584');
      rc.beginPath();
      rc.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * progress);
      rc.strokeStyle = g; rc.lineWidth = 6; rc.lineCap = 'round'; rc.stroke();
    }
  }
  drawRing(0);

  function pulse() {
    ring.classList.add('pulse');
    setTimeout(() => ring.classList.remove('pulse'), 110);
  }

  // ── Waveform ──
  const wc = document.getElementById('waveCanvas');
  const wx = wc.getContext('2d');

  function resizeWave() {
    wc.width = wc.offsetWidth * devicePixelRatio;
    wc.height = wc.offsetHeight * devicePixelRatio;
    wx.scale(devicePixelRatio, devicePixelRatio);
  }
  resizeWave();
  window.addEventListener('resize', resizeWave);

  function drawWave(data) {
    const W = wc.offsetWidth, H = wc.offsetHeight;
    wx.clearRect(0, 0, W, H);
    wx.beginPath();
    const step = W / data.length;
    for (let i = 0; i < data.length; i++) {
      const y = (data[i] / 128) * H / 2;
      i === 0 ? wx.moveTo(0, y) : wx.lineTo(i * step, y);
    }
    const g = wx.createLinearGradient(0, 0, W, 0);
    g.addColorStop(0, '#6c63ff'); g.addColorStop(1, '#ff6584');
    wx.strokeStyle = g; wx.lineWidth = 2; wx.stroke();
  }

  function clearWave() {
    const W = wc.offsetWidth, H = wc.offsetHeight;
    wx.clearRect(0, 0, W, H);
    wx.beginPath(); wx.moveTo(0, H / 2); wx.lineTo(W, H / 2);
    wx.strokeStyle = '#2a2a35'; wx.lineWidth = 1; wx.stroke();
  }
  clearWave();

  // ── Beat dots ──
  function buildDots() {
    const c = document.getElementById('beatDots');
    c.innerHTML = '';
    for (let i = 0; i < S.beats; i++) {
      const d = document.createElement('div');
      d.className = 'dot'; d.id = `d${i}`; c.appendChild(d);
    }
  }

  function litDot(i) {
    for (let j = 0; j < S.beats; j++) {
      const d = document.getElementById(`d${j}`);
      if (d) d.className = 'dot';
    }
    const d = document.getElementById(`d${i}`);
    if (d) d.className = i === 0 ? 'dot on-accent' : 'dot on';
  }

  // ── Metronome ──
  function sched() {
    const ctx = S.ctx;
    const iv = 60 / S.bpm;
    while (S.nextBeat < ctx.currentTime + 0.2) {
      const beat = S.beatCount % S.beats;
      const t = S.nextBeat;

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = beat === 0 ? 1200 : 900;
      gain.gain.setValueAtTime(S.vol, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      osc.start(t); osc.stop(t + 0.1);

      const delay = (t - ctx.currentTime) * 1000;
      ;(function(b, p) {
        setTimeout(() => {
          litDot(b % S.beats); pulse();
          drawRing((b % S.beats + 1) / S.beats);
        }, Math.max(0, delay));
      })(S.beatCount, beat);

      S.nextBeat += iv;
      S.beatCount++;
    }
  }

  function startMetro() {
    audioCtx();
    S.metroOn = true;
    S.nextBeat = S.ctx.currentTime + 0.05;
    S.beatCount = 0;
    S.metroTimer = setInterval(sched, 25);
    document.getElementById('metroBtn').textContent = '⏸ 節拍器';
    updateBpmDisplay();
  }

  function stopMetro() {
    S.metroOn = false;
    clearInterval(S.metroTimer);
    document.getElementById('metroBtn').textContent = '▶ 節拍器';
    for (let i = 0; i < S.beats; i++) {
      const d = document.getElementById(`d${i}`);
      if (d) d.className = 'dot';
    }
    drawRing(0);
  }

  // ── BPM update ──
  function updateBpm(v) {
    S.bpm = Math.max(40, Math.min(240, Math.round(v)));
    document.getElementById('bpmSlider').value = S.bpm;
    document.getElementById('bpmVal').textContent = S.bpm;
  }

  function updateBpmDisplay() {
    document.getElementById('bpmNum').textContent = S.bpm;
  }

  // ── Beat detection ──
  const HIST = 43, THRESH = 1.4, MIN_IV = 260;

  function detect(analyser) {
    const buf = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(buf);

    const sr = S.ctx.sampleRate;
    const binHz = sr / (buf.length * 2);
    const lo = Math.floor(20 / binHz);
    const hi = Math.min(Math.floor(200 / binHz), buf.length - 1);

    let e = 0;
    for (let i = lo; i <= hi; i++) e += buf[i] * buf[i];
    e /= (hi - lo + 1);

    S.energyHist.push(e);
    if (S.energyHist.length > HIST) S.energyHist.shift();
    const avg = S.energyHist.reduce((a, b) => a + b, 0) / S.energyHist.length;

    const now = performance.now();
    if (e > THRESH * avg && e > 500 && now - S.lastBeat > MIN_IV) {
      const iv = now - S.lastBeat;
      if (S.lastBeat > 0 && iv < 2000) {
        S.beatIntervals.push(iv);
        if (S.beatIntervals.length > 8) S.beatIntervals.shift();

        const avgIv = S.beatIntervals.reduce((a, b) => a + b, 0) / S.beatIntervals.length;
        let bpm = 60000 / avgIv;
        while (bpm < 60) bpm *= 2;
        while (bpm > 200) bpm /= 2;

        S.smoothBpms.push(bpm);
        if (S.smoothBpms.length > 4) S.smoothBpms.shift();
        const smooth = S.smoothBpms.reduce((a, b) => a + b, 0) / S.smoothBpms.length;

        document.getElementById('bpmNum').textContent = Math.round(smooth);
        pulse();

        if (S.autoSync && S.beatIntervals.length >= 2) {
          updateBpm(smooth);
          document.getElementById('bpmStatus').textContent = '已同步 ✓';
        } else if (S.autoSync) {
          document.getElementById('bpmStatus').textContent = `收集中 ${S.beatIntervals.length}/2`;
        }
      }
      S.lastBeat = now;
    }
  }

  // ── Mic ──
  async function startMic() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioCtx();
      S.micStream = stream;
      const src = S.ctx.createMediaStreamSource(stream);
      const an = S.ctx.createAnalyser();
      an.fftSize = 2048; an.smoothingTimeConstant = 0.85;
      src.connect(an);
      S.analyser = an; S.sourceNode = src; S.listening = true;

      S.energyHist.length = 0; S.beatIntervals.length = 0;
      S.smoothBpms.length = 0; S.lastBeat = 0;

      document.getElementById('micBtn').textContent = '⏹ 停止偵測';
      document.getElementById('micBtn').classList.add('active');
      document.getElementById('status').textContent = '🎙 正在偵測，請播放音樂…';
      document.getElementById('bpmStatus').textContent = '';

      const td = new Uint8Array(an.fftSize);
      function loop() {
        if (!S.listening) return;
        detect(an);
        an.getByteTimeDomainData(td);
        drawWave(td);
        S.rafId = requestAnimationFrame(loop);
      }
      loop();
    } catch (err) {
      document.getElementById('status').textContent = '❌ 無法使用麥克風：' + err.message;
    }
  }

  function stopMic() {
    S.listening = false;
    cancelAnimationFrame(S.rafId);
    if (S.micStream) { S.micStream.getTracks().forEach(t => t.stop()); S.micStream = null; }
    S.analyser = null; S.sourceNode = null;
    document.getElementById('micBtn').textContent = '🎙 開始偵測';
    document.getElementById('micBtn').classList.remove('active');
    document.getElementById('status').textContent = '點擊「開始偵測」，對著麥克風播放音樂';
    document.getElementById('bpmStatus').textContent = '';
    clearWave();
  }

  // ── Events ──
  document.getElementById('micBtn').addEventListener('click', () => {
    if (S.listening) stopMic(); else startMic();
  });

  document.getElementById('metroBtn').addEventListener('click', () => {
    audioCtx();
    if (S.metroOn) stopMetro(); else startMetro();
  });

  document.getElementById('syncToggle').addEventListener('click', function () {
    S.autoSync = !S.autoSync;
    this.classList.toggle('on', S.autoSync);
    document.getElementById('status').textContent = S.autoSync
      ? '自動同步已開啟' : '自動同步已關閉，請手動調整 BPM';
  });

  document.getElementById('bpmSlider').addEventListener('input', function () {
    updateBpm(+this.value);
    if (S.metroOn) updateBpmDisplay();
  });

  document.getElementById('bpmMinus').addEventListener('click', () => { updateBpm(S.bpm - 1); if (S.metroOn) updateBpmDisplay(); });
  document.getElementById('bpmPlus').addEventListener('click', () => { updateBpm(S.bpm + 1); if (S.metroOn) updateBpmDisplay(); });

  document.getElementById('beatsSlider').addEventListener('input', function () {
    S.beats = +this.value;
    document.getElementById('beatsVal').textContent = S.beats + '/4';
    buildDots();
    if (S.metroOn) { stopMetro(); startMetro(); }
  });

  document.getElementById('volSlider').addEventListener('input', function () {
    S.vol = +this.value / 100;
    document.getElementById('volVal').textContent = this.value + '%';
  });

  // ── Init ──
  buildDots();
  </script>
</body>
</html>
